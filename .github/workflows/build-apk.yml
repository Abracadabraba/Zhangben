name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk laiqian-debug.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: laiqian-debug-apk
          path: laiqian-debug.apk
          retention-days: 30

      - name: Publish as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: 来钱 最新安装包
          body: |
            自动构建的安卓安装包（未签名的 debug 版本，可直接安装使用）。
            每次推送到 main 分支都会自动重新生成，覆盖这个 release。
          files: laiqian-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
